<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nollie Decks</title>

<style>
    

html{
background:#111;
}

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#111;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* 🔥 TRANSICIÓN */
.fade{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
opacity:1;
transition:0.6s;
}

.fade.hidden{
opacity:0;
pointer-events:none;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:3px;
}

nav{
text-align:center;
background:#1a1a1a;
padding:10px;
position:relative;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
position:relative;
}

nav a:hover{
color:#ff3c3c;
}

/* 🔥 CONTACTO NEON */
nav a.contacto{
font-weight:bold;
}

nav a.contacto:hover{
color:#ff3c3c;
animation:neon 1s infinite alternate;
}

@keyframes neon{
from{ text-shadow:0 0 5px #ff3c3c;}
to{ text-shadow:0 0 20px #ff3c3c,0 0 40px #ff3c3c;}
}

/* TOOLTIP */
nav a.contacto::after{
content:"Mándanos un DM";
position:absolute;
bottom:-35px;
left:50%;
transform:translateX(-50%) translateY(10px);
background:#ff3c3c;
color:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
white-space:nowrap;
opacity:0;
pointer-events:none;
transition:0.3s;
}

nav a.contacto:hover::after{
opacity:1;
transform:translateX(-50%) translateY(0);
}

nav a.active{
color:#ff3c3c;
}

.seccion{
padding:100px 20px;
text-align:center;
}

/* CONTENEDOR */

.deck-container{
position:relative;
width:700px;
height:350px;
margin:auto;
}

/* DECK GENERAL */

.deck{
position:absolute;
top:0;
width:120px;
transition:0.5s ease;
}

.deck-img{
width:100%;
transform:scaleX(-1);
border-radius:60px;
}

/* BLOQUEO IMÁGENES */
img{
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

/* MARCAS DE AGUA */

.watermark{
position:absolute;
left:50%;
transform:translateX(-50%);
width:32px;
opacity:0.30;
pointer-events:none;
}

.watermark.top{
top:8%;
}

.watermark.middle{
top:50%;
transform:translate(-50%,-50%);
}

.watermark.bottom{
bottom:8%;
}

/* POSICIONES */

.deck1{
left:50%;
transform:translateX(-50%);
z-index:5;
}

.deck2{
left:20%;
z-index:2;
}

.deck3{
right:20%;
z-index:2;
}

.deck4{
left:50%;
transform:translateX(-50%);
opacity:0;
z-index:4;
}

.deck5{
left:50%;
transform:translateX(-50%);
opacity:0;
z-index:4;
}

/* HOVER */

.deck2:hover{
transform:translateY(-10px);
}

.deck3:hover{
transform:translateY(-10px);
}

/* CENTRAL */

.deck1:hover{
transform:translateX(-50%) scale(1.12);
}

.deck1:hover .deck-img{
box-shadow:0 25px 40px rgba(0,0,0,0.6);
}

/* CARRUSEL */

.deck1:hover ~ .deck2{
opacity:0;
}

.deck1:hover ~ .deck3{
opacity:0;
}

.deck1:hover ~ .deck4{
opacity:1;
transform:translateX(-200px);
}

.deck1:hover ~ .deck5{
opacity:1;
transform:translateX(80px);
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:auto;
}

</style>
</head>

<body>

<!-- 🔥 TRANSICIÓN -->
<div class="fade"></div>

<header>
NOLLIE SKATEBOARDS
</header>

<nav>
<a href="index.html">Inicio</a>
<a href="decks.html" class="active">Decks</a>
<a href="nosotros.html">Nosotros</a>
<a href="https://www.instagram.com/direct/t/17850735650627151/" target="_blank" class="contacto">Contacto</a>
</nav>

<div class="seccion">

<h1>DECKS</h1>

<div class="deck-container">

<div class="deck deck1">
<img src="deck1.png" class="deck-img">
<img src="NollieBorde.png" class="watermark top">
<img src="NollieBorde.png" class="watermark middle">
<img src="NollieBorde.png" class="watermark bottom">
</div>

<div class="deck deck2">
<img src="deck2.png" class="deck-img">
<img src="NollieBorde.png" class="watermark top">
<img src="NollieBorde.png" class="watermark middle">
<img src="NollieBorde.png" class="watermark bottom">
</div>

<div class="deck deck3">
<img src="deck3.png" class="deck-img">
<img src="NollieBorde.png" class="watermark top">
<img src="NollieBorde.png" class="watermark middle">
<img src="NollieBorde.png" class="watermark bottom">
</div>

<div class="deck deck4">
<img src="deck4.png" class="deck-img">
<img src="NollieBorde.png" class="watermark top">
<img src="NollieBorde.png" class="watermark middle">
<img src="NollieBorde.png" class="watermark bottom">
</div>

<div class="deck deck5">
<img src="deck5.png" class="deck-img">
<img src="NollieBorde.png" class="watermark top">
<img src="NollieBorde.png" class="watermark middle">
<img src="NollieBorde.png" class="watermark bottom">
</div>

</div>

</div>

<footer>
© 2026 Nollie Skateboards
</footer>

<script>

/* 🔥 TRANSICIÓN */
window.onload=()=>document.querySelector(".fade").classList.add("hidden");

document.querySelectorAll("a").forEach(link=>{
if(!link.href.includes("instagram")){
link.addEventListener("click",function(e){
e.preventDefault();
let url=this.href;
document.querySelector(".fade").classList.remove("hidden");
setTimeout(()=>window.location=url,500);
});
}
});

/* 🔒 PROTECCIÓN */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());

document.addEventListener("keydown", function(e){
if(e.key === "F12") e.preventDefault();
if(e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
if(e.ctrlKey && e.key === "u") e.preventDefault();
if(e.ctrlKey && e.key === "s") e.preventDefault();
});

setInterval(()=>{
let w = window.outerWidth - window.innerWidth;
let h = window.outerHeight - window.innerHeight;
if(w > 160 || h > 160){
document.body.innerHTML = "";
}
},1000);

</script>

</body>
</html>
